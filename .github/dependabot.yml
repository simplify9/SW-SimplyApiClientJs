# Dependabot config for npm-based frontend/CMS repos (React/Vite/Next/Vue/Strapi).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "Asia/Amman"
    cooldown:
      default-days: 3
      semver-patch-days: 1
      semver-minor-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 10
    groups:
      npm-patch:
        update-types: ["patch"]
      npm-minor:
        update-types: ["minor"]
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "Asia/Amman"
    cooldown:
      default-days: 3
      semver-patch-days: 1
      semver-minor-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 5
    groups:
      actions-patch:
        update-types: ["patch"]
      actions-minor:
        update-types: ["minor"]
    labels:
      - "dependencies"
      - "github-actions"
